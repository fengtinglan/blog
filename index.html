<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风起拾光</title>
    <style>
        :root {
            --bg: #f5f0eb;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --accent: #d4a373;
            --shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', '宋体', serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            flex: 1;
            width: 100%;
        }

        .header { text-align: center; margin-bottom: 2.5rem; }
        .logo { font-size: 2.2rem; font-weight: 700; color: #3a2a1a; letter-spacing: 3px; }
        .logo span { color: var(--accent); }
        .subtitle { color: #8b7a65; margin-top: 0.3rem; font-size: 0.95rem; }
        .back-row { margin-bottom: 1.8rem; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 0.3rem;
            background: none; border: 1px solid #d4c5b0; border-radius: 25px;
            padding: 0.4rem 1.2rem; color: #5e4c3a; cursor: pointer;
            font-family: inherit; font-size: 0.9rem; transition: all 0.2s;
        }
        .back-btn:hover { background: #efe4d7; }
        .page { display: none; animation: fadeIn 0.35s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .lucky-color {
            background: linear-gradient(135deg, #fff8f0, #ffffff);
            border-left: 5px solid var(--accent); border-radius: 16px;
            padding: 1rem 1.5rem; margin-bottom: 2.5rem;
            display: flex; align-items: center; gap: 1rem; box-shadow: var(--shadow);
        }
        .color-box { width: 48px; height: 48px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .lucky-text { font-size: 0.95rem; color: #5e4c3a; }
        .lucky-text strong { font-size: 1.1rem; color: #3a2a1a; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .card {
            background: var(--card-bg); border-radius: 18px; padding: 2rem 1rem;
            text-align: center; box-shadow: var(--shadow); cursor: pointer;
            transition: all 0.25s; border: 1px solid #f0e8dd; text-decoration: none; color: inherit;
            display: flex; flex-direction: column; align-items: center; gap: 0.8rem;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 14px 28px rgba(0,0,0,0.07); border-color: #d4b896; }
        .card-icon { font-size: 2.5rem; }
        .card-title { font-weight: 600; font-size: 1.1rem; color: #3a2a1a; }
        .card-desc { font-size: 0.8rem; color: #9b8b7a; line-height: 1.4; }

        /* 文章列表卡片 */
        .article-card {
            background: var(--card-bg);
            border-radius: 16px;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.25s;
            border: 1px solid #f0e8dd;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .article-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.07); }
        .article-cover {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #e8ddd0;
        }
        .article-body {
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .article-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2c2416;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .article-meta-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #8b7a65;
        }
        .author-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .author-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* 文章详情页 */
        .post-detail {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem 2rem 2.5rem;
            box-shadow: var(--shadow);
            border: 1px solid #f0e8dd;
        }
        .post-cover {
            width: 100%;
            max-height: 360px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            background: #e8ddd0;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .post-meta {
            display: flex;
            flex-direction: column;
        }
        .post-author {
            font-weight: 600;
            color: #3a2a1a;
        }
        .post-date {
            font-size: 0.85rem;
            color: #ab9a86;
        }
        .post-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            color: #2c2416;
        }
        .post-content {
            line-height: 2;
            font-size: 1.05rem;
            color: #3d3529;
            white-space: pre-wrap;
        }

        .loading { text-align: center; color: #8b7a65; padding: 3rem 0; }
        footer {
            text-align: center; padding: 2rem 1rem; color: #b7a797;
            font-size: 0.85rem; border-top: 1px solid #e8ddd0; margin-top: auto;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page active" id="page-home">
        <div class="header">
            <div class="logo">风起<span>拾光</span></div>
            <div class="subtitle">收集微光，安静记录</div>
        </div>
        <div class="lucky-color">
            <div class="color-box" id="luckyColorBox"></div>
            <div class="lucky-text">
                今日幸运色 <strong id="luckyColorName"></strong><br>
                <span style="font-size:0.8rem;">愿这一抹色彩点亮你的日常</span>
            </div>
        </div>
        <div class="grid">
            <div class="card" onclick="navigateTo('/blog')">
                <div class="card-icon">📝</div>
                <div class="card-title">文字</div>
                <div class="card-desc">阅读 & 书写</div>
            </div>
            <div class="card" onclick="navigateTo('/tools')">
                <div class="card-icon">🔧</div>
                <div class="card-title">工具</div>
                <div class="card-desc">实用小工具</div>
            </div>
        </div>
    </div>

    <div class="page" id="page-blog">
        <div class="back-row"><button class="back-btn" onclick="navigateTo('/')">← 返回首页</button></div>
        <div id="articlesContainer"></div>
    </div>

    <div class="page" id="page-tools">
        <div class="back-row"><button class="back-btn" onclick="navigateTo('/')">← 返回首页</button></div>
        <div style="margin-bottom: 1.5rem;">
            <h2 style="color: #3a2a1a; margin-bottom: 0.2rem;">🧰 工具箱</h2>
            <div style="color: #8b7a65; font-size:0.9rem;">顺手做的一些小玩意儿</div>
        </div>
        <div class="grid">
            <div class="card" onclick="window.open('https://legado-svg.heartthrob.cn/', '_blank')">
                <div class="card-icon">💬</div>
                <div class="card-title">阅读气泡</div>
                <div class="card-desc">生成 SVG 书摘气泡</div>
            </div>
        </div>
    </div>

    <div class="page" id="page-post">
        <div class="back-row"><button class="back-btn" onclick="history.back()">← 返回文章列表</button></div>
        <div id="postDetailContainer" class="post-detail"></div>
    </div>
</div>

<footer>© 2026 风起 · 安静写字，温柔记录</footer>

<script>
    // ======================= 配置 =======================
    const ARTICLES_JSON_URL = 'https://raw.githubusercontent.com/fengtinglan/blog/main/articles.json';
    const DEFAULT_AVATAR = 'https://gips1.baidu.com/it/u=819355347,3742778360&fm=3074&app=3074&f=PNG?w=2048&h=2048';
    const DEFAULT_COVER = 'http://img1.baidu.com/it/u=4244987539,1765968336&fm=253&fmt=auto&app=138&f=JPEG?w=889&h=500';
    // ====================================================

    let allArticles = [];

    // 幸运色
    const dayColors = [
        { name: '珊瑚橘', code: '#FA7A61' },
        { name: '月光蓝', code: '#7A9EB1' },
        { name: '薄荷绿', code: '#7EC8A0' },
        { name: '鸢尾紫', code: '#9A7AA0' },
        { name: '琥珀黄', code: '#E5A845' },
        { name: '烟粉色', code: '#D4A5A5' },
        { name: '松石青', code: '#6BA3A0' }
    ];
    const today = new Date().getDay();
    const luckyColor = dayColors[today];
    document.getElementById('luckyColorBox').style.backgroundColor = luckyColor.code;
    document.getElementById('luckyColorName').textContent = luckyColor.name + ' ' + luckyColor.code;

    // 路由
    function getRoute() {
        let hash = location.hash.replace('#', '');
        if (!hash || hash === '/') return '/';
        if (hash[0] !== '/') hash = '/' + hash;
        return hash;
    }

    function showPage(route) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const pageMap = {
            '/': 'page-home',
            '/blog': 'page-blog',
            '/tools': 'page-tools',
            '/post': 'page-post'
        };

        let pageId;
        if (route.startsWith('/post/')) {
            pageId = 'page-post';
            renderPostDetail(route);
        } else {
            pageId = pageMap[route] || 'page-home';
        }
        document.getElementById(pageId).classList.add('active');
        if (route === '/blog') loadArticleList();
    }

    function navigateTo(path) {
        location.hash = '#' + path;
    }

    window.addEventListener('hashchange', () => showPage(getRoute()));
    window.addEventListener('load', () => {
        fetchArticles().then(() => showPage(getRoute()));
    });

    async function fetchArticles() {
        try {
            const response = await fetch(ARTICLES_JSON_URL + '?t=' + Date.now());
            if (response.ok) {
                allArticles = await response.json();
                localStorage.setItem('feng_blog_cache', JSON.stringify(allArticles));
            }
        } catch (e) {
            const cached = localStorage.getItem('feng_blog_cache');
            if (cached) {
                try { allArticles = JSON.parse(cached); } catch(e2) {}
            }
        }
    }

    async function loadArticleList() {
        const container = document.getElementById('articlesContainer');
        container.innerHTML = '<div class="loading">📡 正在加载文章...</div>';
        if (allArticles.length === 0) {
            await fetchArticles();
        }
        renderArticleList();
    }

    function renderArticleList() {
        const container = document.getElementById('articlesContainer');
        if (!allArticles || allArticles.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#8b7a65;">暂时还没有文章。</p>';
            return;
        }
        container.innerHTML = '';
        allArticles.forEach(article => {
            const card = document.createElement('div');
            card.className = 'article-card';
            card.innerHTML = `
                <img class="article-cover" src="${DEFAULT_COVER}" alt="cover" loading="lazy"
                     onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22800%22 height=%22160%22%3E%3Crect fill=%22%23e8ddd0%22 width=%22800%22 height=%22160%22/%3E%3Ctext fill=%22%23b7a797%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2220%22%3E📷%3C/text%3E%3C/svg%3E';">
                <div class="article-body">
                    <div class="article-title">${article.title}</div>
                    <div class="article-meta-bottom">
                        <div class="author-info">
                            <img class="author-avatar" src="${DEFAULT_AVATAR}" alt="avatar" onerror="this.style.display='none';">
                            <span>风起</span>
                            <span style="margin-left:0.3rem; color:#ab9a86;">· ${article.date}</span>
                        </div>
                    </div>
                </div>
            `;
            card.addEventListener('click', () => {
                navigateTo('/post/' + encodeURIComponent(article.id));
            });
            container.appendChild(card);
        });
    }

    function renderPostDetail(route) {
        const container = document.getElementById('postDetailContainer');
        const slug = decodeURIComponent(route.replace('/post/', ''));
        // 根据 id 查找文章，不再使用标题生成的 slug
        const article = allArticles.find(a => a.id === slug);
        if (!article) {
            container.innerHTML = '<p style="text-align:center; color:#b04545;">文章未找到</p>';
            return;
        }
        container.innerHTML = `
            <img class="post-cover" src="${DEFAULT_COVER}" alt="cover" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22800%22 height=%22240%22%3E%3Crect fill=%22%23e8ddd0%22 width=%22800%22 height=%22240%22/%3E%3C/svg%3E';">
            <h1 class="post-title">${article.title}</h1>
            <div class="post-header">
                <img class="post-avatar" src="${DEFAULT_AVATAR}" alt="avatar">
                <div class="post-meta">
                    <span class="post-author">风起</span>
                    <span class="post-date">${article.date}</span>
                </div>
            </div>
            <div class="post-content">${article.content}</div>
        `;
    }
</script>
</body>
</html>
