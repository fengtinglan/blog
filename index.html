<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风起拾光</title>
    <style>
        :root {
            --bg: #f5f0eb;
            --card: #ffffff;
            --text: #2c2c2c;
            --accent: #d4a373;
            --shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', '宋体', serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            flex: 1;
            width: 100%;
        }
        .header { text-align: center; margin-bottom: 2.5rem; }
        .logo { font-size: 2.2rem; font-weight: 700; color: #3a2a1a; letter-spacing: 3px; }
        .logo span { color: var(--accent); }
        .subtitle { color: #8b7a65; margin-top: 0.3rem; font-size: 0.95rem; }
        .back-row { margin-bottom: 1.8rem; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 0.3rem;
            background: none; border: 1px solid #d4c5b0; border-radius: 25px;
            padding: 0.4rem 1.2rem; color: #5e4c3a; cursor: pointer;
            font-family: inherit; font-size: 0.9rem; transition: all 0.2s;
        }
        .back-btn:hover { background: #efe4d7; }
        .page { display: none; animation: fadeIn 0.35s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .lucky-color {
            background: linear-gradient(135deg, #fff8f0, #ffffff);
            border-left: 5px solid var(--accent); border-radius: 16px;
            padding: 1rem 1.5rem; margin-bottom: 2.5rem;
            display: flex; align-items: center; gap: 1rem; box-shadow: var(--shadow);
        }
        .color-box { width: 48px; height: 48px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .lucky-text { font-size: 0.95rem; color: #5e4c3a; }
        .lucky-text strong { font-size: 1.1rem; color: #3a2a1a; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .card {
            background: var(--card); border-radius: 18px; padding: 2rem 1rem;
            text-align: center; box-shadow: var(--shadow); cursor: pointer;
            transition: all 0.25s; border: 1px solid #f0e8dd; text-decoration: none; color: inherit;
            display: flex; flex-direction: column; align-items: center; gap: 0.8rem;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 14px 28px rgba(0,0,0,0.07); border-color: #d4b896; }
        .card-icon { font-size: 2.5rem; }
        .card-title { font-weight: 600; font-size: 1.1rem; color: #3a2a1a; }
        .card-desc { font-size: 0.8rem; color: #9b8b7a; line-height: 1.4; }

        .article-card {
            background: var(--card); border-radius: 16px; padding: 1.8rem;
            margin-bottom: 1.5rem; box-shadow: var(--shadow); cursor: pointer;
            transition: all 0.25s; border: 1px solid #f0e8dd;
        }
        .article-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.07); }
        .article-card h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.4rem; color: #2c2416; }
        .meta { font-size: 0.8rem; color: #ab9a86; margin-bottom: 0.8rem; }
        .summary { color: #5f5346; }
        .full-content {
            display: none; margin-top: 1.2rem; padding-top: 1.2rem;
            border-top: 1px dashed #e4d9cd; color: #3d3529; line-height: 1.9;
            white-space: pre-wrap;
        }
        .article-card.open .full-content { display: block; }

        .loading { text-align: center; color: #8b7a65; padding: 3rem 0; }
        footer {
            text-align: center; padding: 2rem 1rem; color: #b7a797;
            font-size: 0.85rem; border-top: 1px solid #e8ddd0; margin-top: auto;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page active" id="page-home">
        <div class="header">
            <div class="logo">风起<span>拾光</span></div>
            <div class="subtitle">收集微光，安静记录</div>
        </div>
        <div class="lucky-color">
            <div class="color-box" id="luckyColorBox"></div>
            <div class="lucky-text">
                今日幸运色 <strong id="luckyColorName"></strong><br>
                <span style="font-size:0.8rem;">愿这一抹色彩点亮你的日常</span>
            </div>
        </div>
        <div class="grid">
            <div class="card" onclick="navigateTo('/blog')">
                <div class="card-icon">📝</div>
                <div class="card-title">文字</div>
                <div class="card-desc">阅读 & 书写</div>
            </div>
            <div class="card" onclick="navigateTo('/tools')">
                <div class="card-icon">🔧</div>
                <div class="card-title">工具</div>
                <div class="card-desc">实用小工具</div>
            </div>
        </div>
    </div>

    <div class="page" id="page-blog">
        <div class="back-row"><button class="back-btn" onclick="navigateTo('/')">← 返回首页</button></div>
        <div id="articlesContainer"></div>
    </div>

    <div class="page" id="page-tools">
        <div class="back-row"><button class="back-btn" onclick="navigateTo('/')">← 返回首页</button></div>
        <div style="margin-bottom: 1.5rem;">
            <h2 style="color: #3a2a1a; margin-bottom: 0.2rem;">🧰 工具箱</h2>
            <div style="color: #8b7a65; font-size:0.9rem;">顺手做的一些小玩意儿</div>
        </div>
        <div class="grid">
            <div class="card" onclick="window.open('https://legado-svg.heartthrob.cn/', '_blank')">
                <div class="card-icon">💬</div>
                <div class="card-title">阅读气泡</div>
                <div class="card-desc">生成 SVG 书摘气泡</div>
            </div>
        </div>
    </div>
</div>

<footer>© 2026 风起 · 安静写字，温柔记录</footer>

<script>
    // 🔴 替换为你的 articles.json Raw 地址（用户名改成你的）
    const ARTICLES_JSON_URL = 'https://raw.githubusercontent.com/fengtinglan/blog/main/articles.json';

    const dayColors = [
        { name: '珊瑚橘', code: '#FA7A61' },
        { name: '月光蓝', code: '#7A9EB1' },
        { name: '薄荷绿', code: '#7EC8A0' },
        { name: '鸢尾紫', code: '#9A7AA0' },
        { name: '琥珀黄', code: '#E5A845' },
        { name: '烟粉色', code: '#D4A5A5' },
        { name: '松石青', code: '#6BA3A0' }
    ];
    const today = new Date().getDay();
    const luckyColor = dayColors[today];
    document.getElementById('luckyColorBox').style.backgroundColor = luckyColor.code;
    document.getElementById('luckyColorName').textContent = luckyColor.name + ' ' + luckyColor.code;

    function getRoute() {
        let hash = location.hash.replace('#', '');
        if (!hash || hash === '/') return '/';
        if (hash[0] !== '/') hash = '/' + hash;
        return hash;
    }
    function showPage(route) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const pageMap = { '/': 'page-home', '/blog': 'page-blog', '/tools': 'page-tools' };
        const pageId = pageMap[route] || 'page-home';
        document.getElementById(pageId).classList.add('active');
        if (route === '/blog') loadArticles();
    }
    function navigateTo(path) { location.hash = '#' + path; }
    window.addEventListener('hashchange', () => showPage(getRoute()));
    window.addEventListener('load', () => showPage(getRoute()));

    async function loadArticles() {
        const container = document.getElementById('articlesContainer');
        container.innerHTML = '<div class="loading">📡 正在加载文章...</div>';
        let articles = [];
        try {
            const cached = localStorage.getItem('feng_blog_cache');
            if (cached) { articles = JSON.parse(cached); renderArticles(articles); }
        } catch(e) {}
        try {
            const response = await fetch(ARTICLES_JSON_URL + '?t=' + Date.now());
            if (!response.ok) throw new Error('网络错误');
            articles = await response.json();
            localStorage.setItem('feng_blog_cache', JSON.stringify(articles));
            renderArticles(articles);
        } catch (error) {
            if (articles.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#b04545;">加载文章失败，请稍后再试。</p>';
            }
        }
    }
    function renderArticles(articles) {
        const container = document.getElementById('articlesContainer');
        if (!articles || articles.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#8b7a65;">暂时还没有文章。</p>';
            return;
        }
        container.innerHTML = '';
        articles.forEach(article => {
            const card = document.createElement('div');
            card.className = 'article-card';
            card.innerHTML = `
                <h2>${article.title}</h2>
                <div class="meta">📅 ${article.date}</div>
                <div class="summary">${article.summary || ''}</div>
                <div class="full-content">${article.content}</div>
            `;
            card.addEventListener('click', function(e) { this.classList.toggle('open'); });
            container.appendChild(card);
        });
    }
</script>
</body>
</html>
