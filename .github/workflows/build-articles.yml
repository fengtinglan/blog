name: Build articles.json

on:
  push:
    paths:
      - 'posts/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Generate articles.json
        run: |
          python3 - <<'PYEOF'
          import os, json, re

          posts_dir = "posts"
          articles = []

          if not os.path.exists(posts_dir):
              with open("articles.json", "w", encoding="utf-8") as f:
                  f.write("[]")
              exit(0)

          for filename in sorted(os.listdir(posts_dir), reverse=True):
              if not filename.endswith(".md"):
                  continue
              filepath = os.path.join(posts_dir, filename)
              with open(filepath, "r", encoding="utf-8") as f:
                  lines = f.readlines()

              # 文件名格式: YYYY-MM-DD-标题.md
              name_no_ext = filename[:-3]  # 去掉 .md
              parts = name_no_ext.split("-", 3)
              if len(parts) < 4:
                  continue
              date_part = "-".join(parts[0:3])
              title_part = parts[3]

              # 如果第一行是 # 标题，则使用该标题
              if lines and lines[0].startswith("# "):
                  title_part = lines[0][2:].strip()
                  body_lines = lines[1:]
              else:
                  body_lines = lines

              content = "".join(body_lines).strip()
              summary = content[:150] + ("..." if len(content) > 150 else "")

              articles.append({
                  "id": name_no_ext,          # ← 新增唯一 ID
                  "title": title_part,
                  "date": date_part,
                  "summary": summary,
                  "content": content
              })

          with open("articles.json", "w", encoding="utf-8") as f:
              json.dump(articles, f, ensure_ascii=False, indent=2)
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add articles.json
          git diff --staged --quiet || (git commit -m "Auto-update articles.json" && git push)
